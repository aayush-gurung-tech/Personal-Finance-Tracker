<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - Flux Finance</title>
    <link rel="icon" type="image/png" href="assets/image/logo.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/image/logo.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/image/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/image/logo.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body class="dash-body">
    <header class="dash-header">
      <div class="container dash-header-row">
        <a class="brand" href="index.html" aria-label="Flux Finance Home">
          <span class="brand-mark" aria-hidden="true">
            <i class="fa-solid fa-wave-square"></i>
          </span>
          <span class="brand-name">Flux Finance</span>
        </a>
        <div class="dash-header-actions">
          <a class="btn btn-ghost" href="login.html">Logout</a>
        </div>
      </div>
    </header>

    <main class="dash-page">
      <div class="container dash">
        <aside class="dash-side">
          <div class="dash-brand">
            <span class="brand-mark" aria-hidden="true">
              <i class="fa-solid fa-wave-square"></i>
            </span>
            <span>FLUX FINANCE</span>
          </div>
          <a class="dash-link" href="dashboard.html"
            ><i class="fa-solid fa-grid-2"></i>Dashboard</a
          >
          <a class="dash-link" href="transactions.html"
            ><i class="fa-solid fa-arrow-right-arrow-left"></i>Transactions</a
          >
          <a class="dash-link" href="budgets.html"
            ><i class="fa-solid fa-wallet"></i>Budgets</a
          >
          <a class="dash-link" href="goals.html"
            ><i class="fa-solid fa-flag"></i>Goals</a
          >
          <a class="dash-link active" href="settings.html"
            ><i class="fa-solid fa-gear"></i>Settings</a
          >
          <a class="dash-btn" href="add-transaction.html"
            ><i class="fa-solid fa-plus"></i>Add Transaction</a
          >
        </aside>

        <section class="dash-main">
          <div class="dash-page-title">
            <div class="muted small">Settings</div>
            <div class="dash-title">Profile & preferences</div>
          </div>

          <div class="panel mt12">
            <div class="panel-head">
              <h3>Update Profile</h3>
            </div>
            <form class="simple-form">
              <label class="field">
                <span>Display name</span>
                <input id="display-name" type="text" value="Sarah" required />
              </label>
              <button class="btn btn-primary" type="submit">Save Settings</button>
            </form>
          </div>
        </section>
      </div>
    </main>
    <script src="js/settings.js"></script>
  </body>
</html>
