<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budgets - Flux Finance</title>
    <link rel="icon" type="image/png" href="asserts/logo.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="asserts/logo.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="asserts/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="asserts/logo.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body class="dash-body">
    <header class="dash-header">
      <div class="container dash-header-row">
        <a class="brand" href="index.html" aria-label="Flux Finance Home">
          <span class="brand-mark" aria-hidden="true">
            <i class="fa-solid fa-wave-square"></i>
          </span>
          <span class="brand-name">Flux Finance</span>
        </a>
        <div class="dash-header-actions">
          <a class="btn btn-ghost" href="login.html">Logout</a>
        </div>
      </div>
    </header>

    <main class="dash-page">
      <div class="container dash">
        <aside class="dash-side">
          <div class="dash-brand">
            <span class="brand-mark" aria-hidden="true">
              <i class="fa-solid fa-wave-square"></i>
            </span>
            <span>FLUX FINANCE</span>
          </div>
          <a class="dash-link" href="dashboard.html"
            ><i class="fa-solid fa-grid-2"></i>Dashboard</a
          >
          <a class="dash-link" href="transactions.html"
            ><i class="fa-solid fa-arrow-right-arrow-left"></i>Transactions</a
          >
          <a class="dash-link active" href="budgets.html"
            ><i class="fa-solid fa-wallet"></i>Budgets</a
          >
          <a class="dash-link" href="goals.html"
            ><i class="fa-solid fa-flag"></i>Goals</a
          >
          <a class="dash-link" href="settings.html"
            ><i class="fa-solid fa-gear"></i>Settings</a
          >
          <a class="dash-btn" href="add-transaction.html"
            ><i class="fa-solid fa-plus"></i>Add Transaction</a
          >
        </aside>

        <section class="dash-main">
          <div class="dash-page-title">
            <div class="muted small">Budgets</div>
            <div class="dash-title">Plan your spending</div>
          </div>

          <div class="dash-kpis budget-kpis">
            <div class="kpi kpi-blue">
              <div class="muted small">Total Budget</div>
              <div class="kpi-value" id="budget-total">$0.00</div>
              <div class="kpi-sub muted" id="budget-total-sub">This period</div>
            </div>
            <div class="kpi kpi-red">
              <div class="muted small">Spent</div>
              <div class="kpi-value" id="budget-spent">$0.00</div>
              <div class="kpi-sub muted" id="budget-spent-sub">This period</div>
            </div>
            <div class="kpi kpi-green">
              <div class="muted small">Remaining</div>
              <div class="kpi-value" id="budget-remaining">$0.00</div>
              <div class="kpi-sub muted" id="budget-remaining-sub">This period</div>
            </div>
          </div>

          <div class="panel mt12" id="budget-create-panel">
            <div class="panel-head">
              <h3>Create Budget</h3>
              <button class="btn btn-ghost" id="toggle-budget-form" type="button">
                <i class="fa-solid fa-plus"></i>Add Budget
              </button>
            </div>

            <form class="simple-form budget-form" id="budget-form" hidden>
              <label class="field">
                <span>Category</span>
                <select id="budget-category" required>
                  <option value="">Select</option>
                  <option>Food &amp; Dining</option>
                  <option>Transportation</option>
                  <option>Housing/Rent</option>
                  <option>Utilities</option>
                  <option>Shopping</option>
                  <option>Entertainment</option>
                  <option>Healthcare</option>
                  <option>Education</option>
                  <option>Business</option>
                  <option>Travel</option>
                  <option>Subscriptions</option>
                  <option>Gifts</option>
                  <option>Savings</option>
                  <option>Others</option>
                </select>
              </label>
              <label class="field">
                <span>Period</span>
                <select id="budget-period" required>
                  <option value="monthly">Monthly</option>
                  <option value="weekly">Weekly</option>
                </select>
              </label>
              <label class="field">
                <span>Amount</span>
                <input
                  id="budget-amount"
                  type="number"
                  min="0"
                  step="0.01"
                  placeholder="e.g. 250"
                  required
                />
              </label>
              <div class="budget-actions">
                <button class="btn btn-primary" type="submit">
                  <i class="fa-solid fa-plus"></i>Create Budget
                </button>
              </div>
            </form>
          </div>

          <div class="panel mt12">
            <div class="panel-head">
              <h3>Your Budgets</h3>
              <div>
                <button class="btn btn-ghost" id="export-budgets" type="button">
                  <i class="fa-solid fa-file-export"></i>Export
                </button>
                <button class="btn btn-ghost" id="import-budgets" type="button">
                  <i class="fa-solid fa-file-import"></i>Import
                </button>
                <button class="btn btn-ghost" id="clear-budgets" type="button">
                  <i class="fa-solid fa-trash"></i>Clear
                </button>
                <input
                  type="file"
                  id="budgets-file"
                  accept="application/json"
                  style="display: none"
                />
              </div>
            </div>

            <div class="table budget-table" id="budgets-table"></div>
          </div>
        </section>
      </div>
    </main>
    <script src="js/budgets.js"></script>
  </body>
</html>
